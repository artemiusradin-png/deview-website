<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEVIEW — Animated Logo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #6366F1;
      --violet: #8B5CF6;
      --cyan: #06B6D4;
      --bg: #08080F;
      --surface: #0F0F1A;
      --border: rgba(99,102,241,0.15);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      gap: 80px;
      padding: 60px 40px;
    }

    /* ───────── HERO STAGE ───────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ───────── LOGO CARD ───────── */
    .logo-card {
      position: relative;
      padding: 56px 72px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
    }

    /* Ambient glow behind logo */
    .logo-card::before {
      content: '';
      position: absolute;
      inset: -40%;
      background: radial-gradient(ellipse at 30% 50%, rgba(99,102,241,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(6,182,212,0.08) 0%, transparent 60%);
      animation: ambientPulse 6s ease-in-out infinite alternate;
    }

    @keyframes ambientPulse {
      from { opacity: 0.6; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    /* ───────── MAIN LOGO SVG ───────── */
    .logo-main {
      position: relative;
      z-index: 1;
      width: 360px;
    }

    /* Clip-reveal: wipe the whole SVG left→right */
    .logo-main .reveal-group {
      animation: wipeIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      clip-path: inset(0 100% 0 0);
    }

    @keyframes wipeIn {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0% 0 0); }
    }

    /* Brand symbol draws in first, faster */
    .logo-main .symbol-group {
      animation: wipeIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      clip-path: inset(0 100% 0 0);
    }

    /* Wordmark follows with delay */
    .logo-main .wordmark-group {
      animation: wipeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      clip-path: inset(0 100% 0 0);
    }

    /* Gradient fill on brand symbol */
    .symbol-gradient {
      fill: url(#symbolGradient);
    }

    /* Wordmark white on dark */
    .wordmark-fill {
      fill: rgba(255,255,255,0.92);
    }

    /* Shimmer sweep over entire logo */
    .shimmer-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.06) 50%,
        transparent 60%
      );
      background-size: 200% 100%;
      animation: shimmer 3.5s ease-in-out 1.8s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ───────── VARIANT GRID ───────── */
    .variants {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .variant-card {
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .variant-card .v-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    /* ── Variant 1: Dark minimal ── */
    .v-dark  { background: #0F0F1A; }

    /* ── Variant 2: Light ── */
    .v-light { background: #F4F4F8; }
    .v-light .v-label { color: rgba(0,0,0,0.3); }

    /* ── Variant 3: Gradient brand ── */
    .v-gradient {
      background: linear-gradient(135deg, #0B0B1A 0%, #12112A 60%, #0A1420 100%);
    }

    .variant-svg {
      width: 200px;
    }

    /* Hover float on variants */
    .variant-card:hover .variant-svg {
      transform: translateY(-3px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .variant-card .variant-svg {
      transition: transform 0.3s ease;
    }

    /* ── Variant 3 glow ── */
    .v-gradient::before {
      content: '';
      position: absolute;
      width: 160px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.3) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: glowPulse 3s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    /* ───────── SYMBOL MARK SOLO ───────── */
    .mark-stage {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .mark-card {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }

    .mark-card:hover {
      border-color: rgba(99,102,241,0.4);
    }

    /* Spinning ring behind mark */
    .mark-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      background: conic-gradient(
        from 0deg,
        transparent 60%,
        rgba(99,102,241,0.6) 80%,
        rgba(6,182,212,0.6) 90%,
        transparent 100%
      ) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spinRing 3s linear infinite;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .mark-card .mark-svg {
      width: 44px;
      position: relative;
      z-index: 1;
    }

    /* ── Dark mark ── */
    .mark-dark  { background: #0F0F1A; }
    /* ── Light mark ── */
    .mark-light { background: #F4F4F8; }
    /* ── Gradient mark ── */
    .mark-gradient { background: linear-gradient(135deg, #1A1A3A, #0D2030); }
  </style>
</head>

  <script>
    // Re-trigger animation on click
    function replayAnimation(card) {
      const sym = card.querySelector('.symbol-group');
      const wm  = card.querySelector('.wordmark-group');
      [sym, wm].forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // reflow
      });
      sym.style.animation = '';
      wm.style.animation  = '';
    }
